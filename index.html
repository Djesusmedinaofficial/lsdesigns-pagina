    <title>LS Designs | Arte Digital</title>
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #060606;
            color: #ffffff;
            font-family: 'Orbitron', 'Arial Black', -apple-system, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(120deg, rgba(255, 0, 43, 0.06) 0%, transparent 40%, rgba(255,255,255,0.02) 100%);
            pointer-events: none;
            z-index: -2;
        }

        /* CANVAS DE PARTÍCULAS */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 50% 30%, #140305 0%, #050505 100%);
        }

        .glow-sphere {
            position: absolute;
            width: 350px;
            height: 350px;
            background: #ff002b;
            filter: blur(160px);
            opacity: 0.12;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: -1;
        }

        /* HERO SECTION */
        .hero {
            min-height: 42vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 70px 20px 24px 20px;
            position: relative;
        }

        .brand-title {
            font-family: 'Orbitron', 'Arial Black', sans-serif;
            font-size: 3.8rem;
            font-weight: 900;
            letter-spacing: 7px;
            text-transform: uppercase;
            margin-bottom: 12px;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 0, 43, 0.22);
            animation: glowRise 2.4s ease-out both;
        }

        .brand-logo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
            animation: glowRise 2.4s ease-out both;
        }

        .brand-logo {
            width: min(360px, 86vw);
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .brand-logo-wrap:hover .brand-logo {
            transform: scale(1.02);
        }


        .red-text {
            color: #ff002b;
            text-shadow: 0 0 20px rgba(255, 0, 43, 0.5);
        }

        .subtitle {
            font-family: 'Orbitron', 'Impact', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 3px;
            color: #f2f2f2;
            max-width: 600px;
            line-height: 1.3;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            white-space: pre-line;
        }

        /* CONTENEDOR GENERAL DE BLOQUES */
        .interface-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 20px 60px 20px;
            position: relative;
            z-index: 10;
            margin-top: -6px;
        }

        .section-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: #dcdcdc;
            text-align: center;
            margin: 24px 0 16px 0;
            text-transform: uppercase;
            display: block;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.08);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* BOTONES CYBER */
        .btn-cyber {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: #ffffff;
            background: linear-gradient(135deg, rgba(10,10,10,0.95), rgba(24,24,24,0.78));
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            text-decoration: none;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            box-shadow: 0 10px 26px rgba(0,0,0,0.28);
            position: relative;
            overflow: hidden;
        }

        .btn-cyber::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
            transform: translateX(-120%);
            transition: transform 0.6s ease;
        }

        .btn-cyber:hover::before {
            transform: translateX(120%);
        }

        .btn-cyber .icon {
            margin-right: 12px;
            font-size: 1.1rem;
        }

        /* HOVER EFFECTS */
        .btn-portfolio {
            border-color: rgba(255, 0, 43, 0.4);
            background: rgba(255, 0, 43, 0.02);
        }
        .btn-portfolio:hover, .btn-portfolio.active {
            background: rgba(255, 0, 43, 0.12);
            border-color: #ff002b;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 0, 43, 0.4);
            transform: translateY(-2px);
        }

        .btn-whatsapp:hover {
            background: rgba(0, 230, 118, 0.08);
            border-color: #00e676;
            color: #00e676;
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.25);
            transform: translateY(-2px);
        }

        .btn-tiktok:hover {
            background: rgba(255, 0, 43, 0.08);
            border-color: #ff002b;
            color: #ffffff;
            box-shadow: -6px 0 20px rgba(0, 242, 254, 0.2), 6px 0 20px rgba(255, 0, 43, 0.35);
            transform: translateY(-2px);
        }

        .btn-instagram:hover {
            background: rgba(218, 51, 134, 0.08);
            border-color: #da3386;
            color: #da3386;
            box-shadow: 0 0 25px rgba(218, 51, 134, 0.25);
            transform: translateY(-2px);
        }

        /* SECCIÓN PORTAFOLIO DESPLEGABLE */
        .portfolio-display {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 5px;
        }

        .portfolio-display.show {
            max-height: 800px; /* Ajustar según cantidad de imágenes */
            margin-top: 18px;
            margin-bottom: 10px;
        }

        /* TARJETAS DE DISEÑO */
        .design-card {
            background: rgba(20, 20, 20, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.35s ease;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02), 0 12px 30px rgba(0,0,0,0.22);
        }

        .design-card:hover {
            border-color: rgba(255, 0, 43, 0.6);
            box-shadow: 0 0 20px rgba(255, 0, 43, 0.2);
            transform: translateY(-2px);
        }

        .design-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .design-card:hover img {
            transform: scale(1.05);
        }

        .card-tag {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(10, 10, 10, 0.88);
            padding: 4px 8px;
            font-size: 0.6rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-left: 2px solid #ff002b;
            font-family: 'Orbitron', sans-serif;
            backdrop-filter: blur(4px);
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 24px 20px 32px;
            font-size: 0.74rem;
            color: #9a9a9a;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        @keyframes glowRise {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            from {
                transform: scale(0.95);
                opacity: 0.7;
            }
            to {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .brand-title {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }
            .subtitle {
                font-size: 0.85rem;
                letter-spacing: 2px;
            }
        }
        /* LIGHTBOX / MODAL PARA IMÁGENES */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 240ms ease;
        }
        .lightbox-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .lightbox-image {
            max-width: 92%;
            max-height: 92%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border-radius: 6px;
            cursor: zoom-out;
            transform: translateY(0);
            transition: transform 240ms ease;
        }
    </style>
</head>
<body>

    <!-- Lienzo de partículas de fondo -->
    <canvas id="particles-canvas"></canvas>
    <div class="glow-sphere"></div>

    <section class="hero">
        <div class="brand-logo-wrap">

        </div>
        <p class="subtitle">DISEÑO GRÁFICO &amp; SUBLIMACIÓN
DE ALTO RENDIMIENTO</p>
    </section>

    <!-- Contenedor de la Interfaz Unificada -->
    <div class="interface-container">
        
        <span class="section-label">Portafolio Digital</span>
        <div class="links-container">
            <!-- BOTÓN INTERACTIVO DE PORTAFOLIO -->
            <div class="btn-cyber btn-portfolio" onclick="togglePortfolio()">

    <!-- Botón de instalación personalizado -->
    <div id="install-container" style="display: none; text-align: center; margin-top: 20px;">
        <button id="btn-install" style="background: #ffffff; color: #000000; border: none; padding: 12px 24px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; max-width: 320px; font-family: sans-serif; letter-spacing: 1px;">
            📲 INSTALAR APP DE LS DESIGNS
        </button>
    </div>

    <footer class="footer">
        © LS DESIGNS // INTERFAZ DIGITAL 2026
    </footer>

    <!-- LIGHTBOX OVERLAY PARA AMPLIAR IMÁGENES -->
    <div id="lightbox-overlay" class="lightbox-overlay" aria-hidden="true">
        <img id="lightbox-img" class="lightbox-image" src="" alt="">
    </div>

    <!-- LOGICA INTERACTIVA Y PARTÍCULAS -->
    <script>
        // Función para abrir y cerrar el portafolio
        function togglePortfolio() {
            const grid = document.getElementById('portfolio-grid');
            const btn = document.querySelector('.btn-portfolio');
            grid.classList.toggle('show');
            btn.classList.toggle('active');
        }

        // --- SISTEMA DE PARTÍCULAS ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        initCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.color = Math.random() > 0.85 ? 'rgba(255, 0, 43, 0.6)' : 'rgba(255, 255, 255, 0.25)';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            if (numberOfParticles > 120) numberOfParticles = 120;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', function() {
            initCanvas();
            init();
        });

        init();
        animate();

        // Lightbox: abrir imagen al hacer clic
        function openLightbox(src, alt) {
            const overlay = document.getElementById('lightbox-overlay');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            img.alt = alt || '';
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const overlay = document.getElementById('lightbox-overlay');
            const img = document.getElementById('lightbox-img');
            overlay.classList.remove('show');
            img.src = '';
            document.body.style.overflow = '';
        }

        // Delegación de clics para todas las imágenes de diseño
        document.addEventListener('click', function(e) {
            const targetImg = e.target.closest('.design-card img');
            if (targetImg) {
                openLightbox(targetImg.src, targetImg.alt);
            }
        });

        // Cerrar al clicar sobre el overlay o presionar Escape
        document.getElementById('lightbox-overlay').addEventListener('click', function(e) {
            closeLightbox();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>

    <script>
        // Registra el Service Worker necesario para la PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then(() => console.log('Service Worker registrado con éxito.'))
                .catch(err => console.log('Error al registrar Service Worker:', err));
        }

        let deferredPrompt;
        const installContainer = document.getElementById('install-container');
        const btnInstall = document.getElementById('btn-install');

        // Detecta si la web se puede instalar como app
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installContainer.style.display = 'block';
        });

        // Acción al hacer clic en tu botón de instalación
        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`El usuario respondió a la instalación: ${outcome}`);
                deferredPrompt = null;
                installContainer.style.display = 'none';
            }
        });

        // Oculta el botón si la app ya fue instalada correctamente
        window.addEventListener('appinstalled', () => {
            console.log('¡LS Designs se instaló con éxito!');
            installContainer.style.display = 'none';
        });
    </script>
</body>
