<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LS Designs | Futuro Visual</title>
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Orbitron', 'Arial Black', -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* FUENTES EXTERNAS */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');

        /* CANVAS DE PARTÍCULAS */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 50% 30%, #140305 0%, #050505 100%);
        }

        .glow-sphere {
            position: absolute;
            width: 350px;
            height: 350px;
            background: #ff002b;
            filter: blur(160px);
            opacity: 0.12;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: -1;
        }

        /* HERO SECTION */
        .hero {
            min-height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 20px 20px 20px;
            position: relative;
        }

        .brand-title {
            font-family: 'Orbitron', 'Arial Black', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .red-text {
            color: #ff002b;
            text-shadow: 0 0 20px rgba(255, 0, 43, 0.5);
        }

        .subtitle {
            font-family: 'Orbitron', 'Impact', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 3px;
            color: #b5b5b5;
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        /* CONTENEDOR GENERAL DE BLOQUES */
        .interface-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 20px 60px 20px;
            position: relative;
            z-index: 10;
        }

        .section-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: #777777;
            text-align: center;
            margin: 35px 0 20px 0;
            text-transform: uppercase;
            display: block;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* BOTONES CYBER */
        .btn-cyber {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: #ffffff;
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            text-decoration: none;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            cursor: pointer;
        }

        .btn-cyber .icon {
            margin-right: 12px;
            font-size: 1.1rem;
        }

        /* HOVER EFFECTS */
        .btn-portfolio {
            border-color: rgba(255, 0, 43, 0.4);
            background: rgba(255, 0, 43, 0.02);
        }
        .btn-portfolio:hover, .btn-portfolio.active {
            background: rgba(255, 0, 43, 0.12);
            border-color: #ff002b;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 0, 43, 0.4);
            transform: translateY(-2px);
        }

        .btn-whatsapp:hover {
            background: rgba(0, 230, 118, 0.08);
            border-color: #00e676;
            color: #00e676;
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.25);
            transform: translateY(-2px);
        }

        .btn-tiktok:hover {
            background: rgba(255, 0, 43, 0.08);
            border-color: #ff002b;
            color: #ffffff;
            box-shadow: -6px 0 20px rgba(0, 242, 254, 0.2), 6px 0 20px rgba(255, 0, 43, 0.35);
            transform: translateY(-2px);
        }

        .btn-instagram:hover {
            background: rgba(218, 51, 134, 0.08);
            border-color: #da3386;
            color: #da3386;
            box-shadow: 0 0 25px rgba(218, 51, 134, 0.25);
            transform: translateY(-2px);
        }

        /* SECCIÓN PORTAFOLIO DESPLEGABLE */
        .portfolio-display {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 5px;
        }

        .portfolio-display.show {
            max-height: 800px; /* Ajustar según cantidad de imágenes */
            margin-top: 18px;
            margin-bottom: 10px;
        }

        /* TARJETAS DE DISEÑO */
        .design-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .design-card:hover {
            border-color: rgba(255, 0, 43, 0.6);
            box-shadow: 0 0 15px rgba(255, 0, 43, 0.15);
        }

        .design-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .design-card:hover img {
            transform: scale(1.05);
        }

        .card-tag {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(10, 10, 10, 0.85);
            padding: 4px 8px;
            font-size: 0.6rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-left: 2px solid #ff002b;
            font-family: 'Orbitron', sans-serif;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: #444444;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .brand-title {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }
            .subtitle {
                font-size: 0.85rem;
                letter-spacing: 2px;
            }
        }
        /* LIGHTBOX / MODAL PARA IMÁGENES */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 240ms ease;
        }
        .lightbox-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .lightbox-image {
            max-width: 92%;
            max-height: 92%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border-radius: 6px;
            cursor: zoom-out;
            transform: translateY(0);
            transition: transform 240ms ease;
        }
    </style>
</head>
<body>

    <!-- Lienzo de partículas de fondo -->
    <canvas id="particles-canvas"></canvas>
    <div class="glow-sphere"></div>

    <section class="hero">
        <h1 class="brand-title">LS <span class="red-text">DESIGNS</span></h1>
        <p class="subtitle">DISEÑO GRÁFICO & SUBLIMACIÓN DE ALTO RENDIMIENTO</p>
    </section>

    <!-- Contenedor de la Interfaz Unificada -->
    <div class="interface-container">
        
        <span class="section-label">Portafolio Digital</span>
        <div class="links-container">
            <!-- BOTÓN INTERACTIVO DE PORTAFOLIO -->
            <div class="btn-cyber btn-portfolio" onclick="togglePortfolio()">
                <span class="icon">⚡</span> VER DISEÑOS REALIZADOS
            </div>

            <!-- CUADRÍCULA DESPLEGABLE DE TRABAJOS -->
            <div id="portfolio-grid" class="portfolio-display">
                
                <!-- Tarjeta 1: Indumentaria/Jersey -->
                <div class="design-card">
                    <!-- Reemplazar 'jersey1.jpg' por la ruta de tu imagen -->
                    <img src="jersey1.jpg" alt="Diseño de Jersey">
                    <div class="card-tag">Concept Sport</div>
                </div>

                <!-- Tarjeta 2: Identidad/Logo -->
                <div class="design-card">
                    <img src="logo1.jpg" alt="Diseño de Logo">
                    <div class="card-tag">Transporte</div>
                </div>

                <!-- Tarjeta 3: Jersey Alternativo -->
                <div class="design-card">
                    <img src="jersey2.jpg" alt="Sublimación Premium">
                    <div class="card-tag">Corporativo</div>
                </div>

                <!-- Tarjeta 4: Contenido/Vector -->
                <div class="design-card">
                    <img src="vector1.jpg" alt="Gráficos vectoriales">
                    <div class="card-tag">Institucional</div>
                </div>

            </div>
        </div>

        <span class="section-label">Conectar con el futuro</span>
        <div class="links-container">
            <a href="https://wa.me/+584121928923" target="_blank" class="btn-cyber btn-whatsapp">
                <span class="icon">💬</span> PROYECTA TU MARCA AQUÍ
            </a>

            <a href="https://www.tiktok.com/@lsdesigns_2020" target="_blank" class="btn-cyber btn-tiktok">
                <span class="icon">🎬</span> TIKTOK
            </a>

            <a href="https://www.instagram.com/lsdesigns_2020" target="_blank" class="btn-cyber btn-instagram">
                <span class="icon">📸</span> INSTAGRAM
            </a>
        </div>

    </div>

    <footer class="footer">
        © LS DESIGNS // INTERFAZ DIGITAL 2026
    </footer>

    <!-- LIGHTBOX OVERLAY PARA AMPLIAR IMÁGENES -->
    <div id="lightbox-overlay" class="lightbox-overlay" aria-hidden="true">
        <img id="lightbox-img" class="lightbox-image" src="" alt="">
    </div>

    <!-- LOGICA INTERACTIVA Y PARTÍCULAS -->
    <script>
        // Función para abrir y cerrar el portafolio
        function togglePortfolio() {
            const grid = document.getElementById('portfolio-grid');
            const btn = document.querySelector('.btn-portfolio');
            grid.classList.toggle('show');
            btn.classList.toggle('active');
        }

        // --- SISTEMA DE PARTÍCULAS ---
        const canvas = document.querySelector('canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.radius = Math.random() * 2 + 1;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 242, 254, 0.6)'; // Tono cian/neón
        ctx.fill();
    }
}

function init() {
    particles = [];
    const count = Math.min(80, (canvas.width * canvas.height) / 20000);
    for (let i = 0; i < count; i++) particles.push(new Particle());
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
init();
animate();
        // Lightbox: abrir imagen al hacer clic
        function openLightbox(src, alt) {
            const overlay = document.getElementById('lightbox-overlay');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            img.alt = alt || '';
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const overlay = document.getElementById('lightbox-overlay');
            const img = document.getElementById('lightbox-img');
            overlay.classList.remove('show');
            img.src = '';
            document.body.style.overflow = '';
        }

        // Delegación de clics para todas las imágenes de diseño
        document.addEventListener('click', function(e) {
            const targetImg = e.target.closest('.design-card img');
            if (targetImg) {
                openLightbox(targetImg.src, targetImg.alt);
            }
        });

        // Cerrar al clicar sobre el overlay o presionar Escape
        document.getElementById('lightbox-overlay').addEventListener('click', function(e) {
            closeLightbox();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
